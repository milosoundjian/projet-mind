defaults: &default_td3
  save_best: false
  base_dir: ${gym_env.env_name}/td3-S${algorithm.seed}_${current_time:}
  collect_stats: true

  plot_agents: false # doesn't work for Lunar Lander and takes more time

  algorithm: &default_td3_algorithm
    seed: 1
    max_grad_norm: 0.5
    n_envs: 1
    n_steps: 100
    nb_evals: 10
    discount_factor: 0.98
    buffer_size: 100000
    batch_size: 64
    tau_target: 0.05
    eval_interval: 2000
    max_epochs: 11000

    learning_starts: 10000

    action_noise: 0.1

    policy_delay: 2
    target_policy_noise: 0.2
    target_policy_noise_clip: 0.5

    architecture:
      actor_hidden_size: [400, 300]
      critic_hidden_size: [400, 300]

    intermediate_rewards: []
    intermediate_n_steps: [10_000, 20_000, 30_000, 40_000, 50_000]

  gym_env:
    env_name: null

  actor_optimizer:
    classname: torch.optim.Adam
    lr: 1e-3

  critic_optimizer:
    classname: torch.optim.Adam
    lr: 1e-3

environments:
  CartPoleContinuous-v1: # Converges but not enough steps / too slow learning rate
    <<: *default_td3
    gym_env:
      env_name: CartPoleContinuous-v1
    action_scaling: 1

    algorithm:
      <<: *default_td3_algorithm
      max_epochs: 4000
      intermediate_rewards: [100, 200, 300, 400, 500]

  Pendulum-v1: # Converges but not enough steps / too slow learning rate
    <<: *default_td3
    gym_env:
      env_name: Pendulum-v1
    action_scaling: 2

    algorithm:
      <<: *default_td3_algorithm
      discount_factor: 0.99
      n_steps: 100
      max_epochs: 10000
      action_noise: 0.2
      target_policy_noise: 0.25
      target_policy_noise_clip: 0.5
      batch_size: 256
      intermediate_rewards: [-1000, -750, -500, -250]

  MountainCarContinuous-v0: # Seems to work as of 2026-03-04
    <<: *default_td3
    gym_env:
      env_name: MountainCarContinuous-v0
    action_scaling: 1

    algorithm:
      <<: *default_td3_algorithm
      buffer_size: 200000
      discount_factor: 0.99
      tau_target: 0.05
      n_steps: 100
      max_epochs: 5000
      action_noise: 3 # can set less crazy noise, around 0.5, but it will be a bit slower
      target_policy_noise: 0.5
      target_policy_noise_clip: 0.5
      batch_size: 256
      intermediate_rewards: [25, 50, 75, 80, 85, 90, 95, 100]

  LunarLanderContinuous-v3:
    <<: *default_td3
    gym_env:
      env_name: LunarLanderContinuous-v3

    algorithm:
      <<: *default_td3_algorithm

      n_steps: 100

      discount_factor: 0.98
      max_epochs: 20000
      action_noise: 0.1
      buffer_size: 500000
      batch_size: 256

      tau_target: 0.05

      learning_starts: 20000

      target_policy_noise: 0.2
      target_policy_noise_clip: 0.5

      intermediate_rewards: [0, 50, 100, 150, 200]

    actor_optimizer:
      classname: torch.optim.Adam
      lr: 1e-3

    critic_optimizer:
      classname: torch.optim.Adam
      lr: 1e-3
